<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEXITEST ELITE | OFFICIAL TERMINAL 🦾</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root { --s: #00ff95; --bg: #050508; --pnl: rgba(10, 10, 15, 0.95); --brd: #1f1f26; --shd: rgba(0, 255, 149, 0.5); --err: #ff2e63; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #e1e1e6; font-family: 'Fira Code', monospace; height: 100vh; overflow: hidden; }

        /* Matrix Background Layer */
        #canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.18; pointer-events: none; }

        /* Auth Wall de Alto Nivel */
        #authWall { 
            position: fixed; inset: 0; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle at center, #0a1a10 0%, #050508 100%);
        }

        .auth-card { 
            position: relative; width: 90%; max-width: 400px; padding: 50px 30px;
            background: var(--pnl); border-radius: 24px; border: 1px solid rgba(0,255,149,0.1);
            text-align: center; backdrop-filter: blur(25px); box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .auth-card::before {
            content: ""; position: absolute; inset: -2px; border-radius: 26px;
            background: conic-gradient(from 0deg, transparent, transparent, var(--s));
            animation: rotate 4s linear infinite; z-index: -1;
        }

        .logo-elite { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; margin-bottom: 5px; }
        .logo-elite span { color: var(--s); text-shadow: 0 0 20px var(--s); }
        .subtitle { font-size: 0.65rem; color: #444; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px; }

        input { 
            width: 100%; background: #000; border: 1px solid #222; color: var(--s); 
            padding: 18px; border-radius: 12px; margin-bottom: 15px; font-family: 'Fira Code';
            text-align: center; font-size: 1rem; border-left: 3px solid var(--s); transition: 0.3s;
        }
        input:focus { border-color: var(--s); box-shadow: 0 0 20px rgba(0,255,149,0.1); }

        .btn-auth { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; 
            cursor: pointer; background: var(--s); color: #000; font-family: 'Orbitron';
            letter-spacing: 2px; box-shadow: 0 0 30px var(--shd); transition: 0.3s;
        }

        /* App Layout */
        .app-container { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }
        .app-bar { padding: 15px 25px; background: rgba(5,5,8,0.9); border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; }
        
        #chatFlow { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; scrollbar-width: none; }
        #chatFlow::-webkit-scrollbar { display: none; }

        .bubble { margin-bottom: 25px; max-width: 85%; padding: 18px; border-radius: 8px; font-size: 0.9rem; line-height: 1.6; animation: slideIn 0.3s ease-out forwards; position: relative; }
        .ai { background: rgba(0,255,149,0.03); border-left: 2px solid var(--s); color: #e1e1e6; }
        .ai b { color: var(--s); text-shadow: 0 0 5px var(--shd); }
        .user { align-self: flex-end; background: rgba(255,255,255,0.05); border-right: 2px solid var(--s); text-align: right; color: var(--inf); }

        .input-area { padding: 20px; background: #050508; display: flex; gap: 12px; border-top: 1px solid var(--brd); backdrop-filter: blur(10px); }
        .btn-action { background: none; border: 1px solid var(--s); color: var(--s); padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 900; transition: 0.2s; }
        .btn-action:hover { background: var(--s); color: #000; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="authWall">
        <div class="auth-card">
            <div class="logo-elite">LEXI<span>TEST</span></div>
            <div class="subtitle">Neural_Link_v11</div>
            <div id="phoneStep">
                <input type="tel" id="phoneNumber" placeholder="+34 000 000 000" autocomplete="off">
                <div id="recaptcha-container"></div>
                <button onclick="enviarSMS()" class="btn-auth">ESTABLECER ENLACE</button>
            </div>
            <div id="codeStep" style="display:none;">
                <input type="number" id="smsCode" placeholder="TOKEN_ID">
                <button onclick="verificarSMS()" class="btn-auth" style="background:#08d9d6">VALIDAR ACCESO</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <header class="app-bar">
            <div style="font-weight: 900; font-size: 1rem; letter-spacing: 2px;">LEXI<span>TEST</span>_ELITE</div>
            <div id="status" onclick="logout()" style="color: var(--s); font-size: 0.6rem; cursor:pointer; letter-spacing: 1px; font-weight: 900;">[ TERMINAL_IDLE ]</div>
        </header>

        <main id="chatFlow"></main>

        <footer class="input-area">
            <button class="btn-action" onclick="document.getElementById('fileIn').click()">PDF</button>
            <input type="text" id="qIn" placeholder="Awaiting command..." onkeypress="if(event.key==='Enter') query()" style="margin:0; text-align:left; border-left:none; border-bottom:1px solid #333; padding: 12px;">
            <input type="file" id="fileIn" hidden onchange="ingest(this.files[0])">
        </footer>
    </div>

<script>
    // --- MATRIX ENGINE (NASA GRADE) ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let columns, drops;
    const fontSize = 14;
    const letters = "010101011101010101110010101010101";

    function initMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = canvas.width / fontSize;
        drops = Array(Math.floor(columns)).fill(1);
    }

    function drawMatrix() {
        ctx.fillStyle = "rgba(5, 5, 8, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff95";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    window.addEventListener('resize', initMatrix);
    initMatrix();
    setInterval(drawMatrix, 60);

    // --- CORE LOGIC ---
    const MI_NUMERO_MAESTRO = "+34698932335";
    const firebaseConfig = {
        apiKey: "AIzaSyBrUH2aTknXf567o2E1_Dmz8oZbUnao7XM",
        authDomain: "lexitest-b6055.firebaseapp.com",
        projectId: "lexitest-b6055",
        storageBucket: "lexitest-b6055.firebasestorage.app",
        messagingSenderId: "919841668760",
        appId: "1:919841668760:web:e86f8712243f9c816a5aed"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let confirmationResult, activeDoc = "";

    auth.onAuthStateChanged(user => {
        document.getElementById('authWall').style.display = user ? 'none' : 'flex';
        if(user) {
            const isMaster = user.phoneNumber === MI_NUMERO_MAESTRO;
            msg("ai", isMaster ? "<b>>> ENLACE MAESTRO DETECTADO.</b> ACCESO ILIMITADO." : ">> CONEXIÓN ESTÁNDAR. LÍMITE: 1 DOCUMENTO.");
        }
    });

    function enviarSMS() {
        const phone = document.getElementById('phoneNumber').value.replace(/\s+/g, '');
        if(!phone.startsWith('+')) return alert("Use format: +34...");
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {'size': 'invisible'});
        auth.signInWithPhoneNumber(phone, window.recaptchaVerifier).then(res => {
            confirmationResult = res;
            document.getElementById('phoneStep').style.display = 'none';
            document.getElementById('codeStep').style.display = 'block';
        }).catch(e => { alert("Error: " + e.message); location.reload(); });
    }

    function verificarSMS() {
        const code = document.getElementById('smsCode').value;
        if(code) confirmationResult.confirm(code).catch(e => alert("TOKEN ERROR"));
    }

    async function ingest(file) {
        if(!file) return;
        const user = auth.currentUser;
        const db = JSON.parse(localStorage.getItem('lexi_v11_docs') || "[]");
        
        if (user.phoneNumber !== MI_NUMERO_MAESTRO && db.length >= 1) {
            return alert("LIMIT_REACHED: CONTACT ADMIN FOR ELITE ACCESS.");
        }

        setStatus("ANALYZING_PDF");
        msg("ai", ">> INITIALIZING DATA_STREAM_EXTRACTION...");

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise;
                let t = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const p = await pdf.getPage(i);
                    const c = await p.getTextContent();
                    t += c.items.map(it => it.str).join(" ") + " ";
                }
                activeDoc = t.replace(/\s\s+/g, ' ');
                db.push({ name: file.name, timestamp: Date.now() });
                localStorage.setItem('lexi_v11_docs', JSON.stringify(db));
                msg("ai", `>> SYNC SUCCESSFUL: <b>${file.name.toUpperCase()}</b>`);
            } catch(err) {
                msg("ai", ">> <span style='color:var(--err)'>ERROR: FAILED TO PARSE PDF STREAM.</span>");
            } finally {
                setStatus("IDLE");
            }
        };
        reader.readAsArrayBuffer(file);
    }

    async function query() {
        const q = document.getElementById('qIn').value;
        if(!q || !activeDoc) return;
        
        msg("user", q.toUpperCase());
        document.getElementById('qIn').value = "";
        setStatus("NEURAL_THINKING");

        try {
            const r = await fetch("https://lexitest.onrender.com/chat", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: `Contexto: ${activeDoc.substring(0, 12000)}. Pregunta: ${q}` })
            });
            const data = await r.json();
            // Formatear respuesta para resaltar artículos y leyes
            const finalResp = (data.response || "NO_DATA_RETURNED")
                .replace(/(Artículo \d+|Ley \d+\/\d+|BOE|Plazo)/gi, '<b>$1</b>')
                .replace(/\n/g, '<br>');
            
            msg("ai", ">> " + finalResp);
        } catch (e) { 
            msg("ai", ">> <span style='color:var(--err)'>ERROR: NEURAL_LINK_BROKEN.</span>"); 
        } finally {
            setStatus("IDLE");
        }
    }

    function msg(type, text) {
        const flow = document.getElementById('chatFlow');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = text;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    function setStatus(text) {
        document.getElementById('status').innerText = `[ TERMINAL_${text} ]`;
    }

    function logout() { auth.signOut().then(() => { localStorage.clear(); location.reload(); }); }
</script>
</body>
</html>
