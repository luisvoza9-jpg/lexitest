<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEXITEST ELITE | TERMINAL 🦾</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root { --s: #00ff95; --bg: #050508; --pnl: rgba(10, 10, 15, 0.95); --brd: #1f1f26; --shd: rgba(0, 255, 149, 0.5); --err: #ff2e63; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #e1e1e6; font-family: 'Fira Code', monospace; height: 100vh; overflow: hidden; }

        /* Matrix Background */
        #canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.15; pointer-events: none; }

        /* Auth Wall */
        #authWall { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #0a1a10 0%, #050508 100%); transition: 0.5s; }
        .auth-card { position: relative; width: 90%; max-width: 400px; padding: 50px 30px; background: var(--pnl); border-radius: 24px; border: 1px solid rgba(0,255,149,0.1); text-align: center; backdrop-filter: blur(25px); box-shadow: 0 0 50px rgba(0,0,0,1); }
        .auth-card::before { content: ""; position: absolute; inset: -2px; border-radius: 26px; background: conic-gradient(from 0deg, transparent, transparent, var(--s)); animation: rotate 4s linear infinite; z-index: -1; }

        .logo-elite { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; margin-bottom: 10px; }
        .logo-elite span { color: var(--s); text-shadow: 0 0 20px var(--s); }
        
        input { width: 100%; background: #000; border: 1px solid #222; color: var(--s); padding: 18px; border-radius: 12px; margin: 20px 0; font-family: 'Fira Code'; text-align: center; font-size: 1rem; border-left: 3px solid var(--s); transition: 0.3s; }
        
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; background: var(--s); color: #000; font-family: 'Orbitron'; letter-spacing: 2px; box-shadow: 0 0 30px var(--shd); transition: 0.3s; }

        /* App Interface */
        .app-container { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }
        .app-bar { padding: 15px 25px; background: rgba(5,5,8,0.9); border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; backdrop-filter: blur(10px); }
        
        #chatFlow { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; scroll-behavior: smooth; }

        .bubble { margin-bottom: 25px; max-width: 85%; padding: 18px; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; animation: slideIn 0.3s ease-out forwards; position: relative; }
        .ai { background: rgba(0,255,149,0.03); border-left: 3px solid var(--s); color: #e1e1e6; align-self: flex-start; }
        .user { align-self: flex-end; background: rgba(255,255,255,0.05); border-right: 3px solid var(--s); text-align: right; color: var(--s); }

        .credits-display { color: var(--gold); border: 1px solid var(--gold); padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: 900; }

        .input-area { padding: 20px; background: #08080a; display: flex; gap: 12px; border-top: 1px solid var(--brd); align-items: center; }
        .btn-action { background: none; border: 1px solid var(--s); color: var(--s); padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 900; font-family: 'Orbitron'; font-size: 0.7rem; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .loading-dots::after { content: '...'; animation: dots 1.5s steps(3, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="authWall">
        <div class="auth-card">
            <div class="logo-elite">LEXI<span>TEST</span></div>
            <p style="font-size:0.6rem; color:#555; letter-spacing:5px; text-transform: uppercase;">Secure_Neural_Access</p>
            <input type="tel" id="userPhone" placeholder="+34 600 000 000" autocomplete="off">
            <button onclick="conectar()" class="btn-auth">ESTABLECER ENLACE</button>
            <p id="authStatus" style="font-size: 0.7rem; margin-top: 15px; color: var(--s); opacity: 0.6;"></p>
        </div>
    </div>

    <div class="app-container">
        <header class="app-bar">
            <div style="font-weight: 900; font-size: 0.9rem; letter-spacing: 2px;">LEXI<span style="color:var(--s)">TEST</span>_ELITE</div>
            <div class="credits-display" id="creditsBtn" onclick="location.reload()">
                <span id="puntosLabel">0</span> <small>CRÉDITOS</small>
            </div>
        </header>

        <main id="chatFlow">
            <div class="bubble ai"><b>>> SISTEMA INICIALIZADO.</b><br>Esperando inyección de datos o comando de voz/texto.</div>
        </main>

        <footer class="input-area">
            <button class="btn-action" onclick="document.getElementById('fileIn').click()">INYECTAR PDF</button>
            <input type="text" id="qIn" placeholder="Escriba un comando..." onkeypress="if(event.key==='Enter') query()" style="flex:1; background:transparent; border:none; border-bottom:1px solid #222; color:var(--s); padding:10px; font-family: 'Fira Code';">
            <input type="file" id="fileIn" hidden onchange="procesarPDF(this.files[0])">
        </footer>
    </div>

<script>
    // --- MATRIX BACKGROUND ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let columns, drops;
    const fontSize = 14;
    function initMatrix() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        columns = canvas.width / fontSize; drops = Array(Math.floor(columns)).fill(1);
    }
    function drawMatrix() {
        ctx.fillStyle = "rgba(5, 5, 8, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff95"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            ctx.fillText("01".charAt(Math.floor(Math.random()*2)), i*fontSize, drops[i]*fontSize);
            if (drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    window.onresize = initMatrix;
    initMatrix(); setInterval(drawMatrix, 60);

    // --- CONFIG SUPABASE ---
    const SB_URL = "https://fjueiqeazwwlpdsnqwkp.supabase.co";
    const SB_KEY = "sb_publishable_UMSVIg-LVnpYHto5o3cm7g_UuVSJAHA";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let userActual = "", misCreditos = 0, activeDoc = "";

    async function conectar() {
        const tel = document.getElementById('userPhone').value.trim();
        if(!tel) return alert("Ingrese identificación telefónica");
        document.getElementById('authStatus').innerText = "CONECTANDO...";
        try {
            let { data, error } = await supabaseClient.from('users').select('*').eq('phone', tel).maybeSingle();
            if (!data) {
                const { data: newUser } = await supabaseClient.from('users').insert([{ phone: tel, credits: 5 }]).select().single();
                data = newUser;
            }
            userActual = tel;
            misCreditos = data.credits;
            document.getElementById('authWall').style.display = 'none';
            updateCreditsUI();
            msg("ai", `<b>>> ACCESO CONCEDIDO.</b> Bienvenido Agente ${tel}.`);
        } catch(e) { alert("ERROR DB."); }
    }

    function updateCreditsUI() { document.getElementById('puntosLabel').innerText = misCreditos; }

    async function query() {
        const q = document.getElementById('qIn').value;
        if(!q || misCreditos <= 0) return;
        
        msg("user", q.toUpperCase());
        document.getElementById('qIn').value = "";
        const tempAiMsg = msg("ai", "<span class='loading-dots'>PROCESANDO</span>");

        try {
            // URL DE TU NUEVA FUNCIÓN DE FIREBASE
            const r = await fetch("https://chat-663efcuufa-uc.a.run.app", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    prompt: activeDoc ? `PDF INYECTADO: ${activeDoc.substring(0, 15000)}. Pregunta del usuario: ${q}` : q
                })
            });

            const d = await r.json();
            if (tempAiMsg) tempAiMsg.remove();

            if (d.response) {
                msg("ai", ">> " + d.response);
                descontarCredito();
            } else {
                msg("ai", ">> <span style='color:var(--err)'>ERROR: RESPUESTA VACÍA DEL NÚCLEO.</span>");
            }
            
        } catch(e) {
            if (tempAiMsg) tempAiMsg.remove();
            msg("ai", ">> <span style='color:var(--err)'>ERROR DE CONEXIÓN CON EL SERVIDOR.</span>");
            console.error(e);
        }
    }

    async function procesarPDF(file) {
        if(!file || misCreditos <= 0) return;
        msg("ai", `>> ESCANEANDO PDF...`);
        const reader = new FileReader();
        reader.onload = async (e) => {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            const pdf = await pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise;
            let t = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const c = await p.getTextContent();
                t += c.items.map(it => it.str).join(" ") + " ";
            }
            activeDoc = t;
            msg("ai", ">> PDF INYECTADO CORRECTAMENTE AL CONTEXTO.");
        };
        reader.readAsArrayBuffer(file);
    }

    async function descontarCredito() {
        misCreditos--;
        updateCreditsUI();
        await supabaseClient.from('users').update({ credits: misCreditos }).eq('phone', userActual);
    }

    function msg(type, text) {
        const f = document.getElementById('chatFlow');
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        d.innerHTML = text;
        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
        return d;
    }
</script>
</body>
</html>
